<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yawp – Demo Account Setup & Access Check</title>
    <style>
        body { font-family: 'DM Mono', monospace, sans-serif; background: #0D0D0D; color: #F0F0F0; max-width: 680px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #E8FF47; font-size: 22px; margin-bottom: 4px; }
        p.sub { color: #666; font-size: 13px; margin-bottom: 28px; }
        .card { background: #141414; border: 1px solid #2A2A2A; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 14px; color: #888; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 1px; }
        .user-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1E1E1E; }
        .user-row:last-child { border-bottom: none; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #2A2A2A; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .user-info { flex: 1; }
        .user-info .name { font-size: 14px; font-weight: 600; }
        .user-info .email { font-size: 12px; color: #666; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge.pending { background: #2A2A2A; color: #666; }
        .badge.ok { background: #1A3A1A; color: #4ADE80; }
        .badge.error { background: #3A1A1A; color: #FF6B6B; }
        .badge.warn { background: #3A2E0A; color: #E8FF47; }
        .btn { background: #E8FF47; color: #0D0D0D; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer; margin-right: 8px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn.secondary { background: #1E1E1E; color: #F0F0F0; border: 1px solid #2A2A2A; }
        .log { background: #0A0A0A; border: 1px solid #1E1E1E; border-radius: 8px; padding: 14px; font-size: 12px; color: #888; max-height: 260px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; }
        .log .ok { color: #4ADE80; }
        .log .err { color: #FF6B6B; }
        .log .info { color: #60A5FA; }
        .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>YAWP — Demo Account Setup & Access Check</h1>
    <p class="sub">Creates demo accounts in Firebase Auth + Firestore, seeds lived-in content, and verifies access.</p>

    <div class="card">
        <h2>Demo Accounts</h2>
        <div id="user-list"></div>
    </div>

    <div class="card">
        <h2>Actions</h2>
        <div class="actions">
            <button class="btn" id="btn-check" onclick="runCheck()">Check Access</button>
            <button class="btn secondary" id="btn-seed" onclick="runFullSeed()">Full Seed (accounts + content)</button>
        </div>
        <div class="log" id="log">Ready. Click "Full Seed" to create accounts and populate demo content, or "Check Access" to verify existing accounts.\n</div>
    </div>

    <!-- Firebase v9 compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVjZiW2V6ejXRLeNJ7s0qG-tuOWMA-HYQ",
            authDomain: "yawpsocial-372ed.firebaseapp.com",
            databaseURL: "https://yawpsocial-372ed-default-rtdb.firebaseio.com",
            projectId: "yawpsocial-372ed",
            storageBucket: "yawpsocial-372ed.firebasestorage.app",
            messagingSenderId: "338138975898",
            appId: "1:338138975898:web:8fc30cbb7a83413c671923"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ── Demo user definitions ─────────────────────────────────────────────
        const DEMO_USERS = [
            {
                name: 'Alex Rivera', email: 'demo1@yawp.com', password: 'DemoYawp2024!',
                username: 'alex_rivera', displayName: 'Alex Rivera', avatar: '🧑',
                bio: 'Recovering algorithmic optimist. Writing to think, not to perform.',
            },
            {
                name: 'Jordan Chen', email: 'demo2@yawp.com', password: 'DemoYawp2024!',
                username: 'jordan_chen', displayName: 'Jordan Chen', avatar: '👩',
                bio: 'Poet. Morning pages devotee. Suspicious of recommendation engines.',
            },
            {
                name: 'Taylor Morgan', email: 'demo3@yawp.com', password: 'DemoYawp2024!',
                username: 'taylor_morgan', displayName: 'Taylor Morgan', avatar: '🧔',
                bio: 'Six months off Instagram. Turns out I have thoughts of my own.',
            },
        ];

        // ── Seed posts (indexed 0=Alex, 1=Jordan, 2=Taylor) ──────────────────
        const SEED_POSTS = [
            // Alex Rivera
            { u: 0, content: "Three months without Twitter. My attention span is back. Turns out the problem wasn't me — it was the machine.", tags: ['#digitalwellness', '#slowinternet'], hearts: 14, ago: 2 },
            { u: 0, content: "Read a whole book today. Didn't post about it until now.", tags: ['#reading'], hearts: 8, ago: 3 },
            { u: 0, content: "The algorithm wanted me angry. I wanted to think. We couldn't find common ground.", tags: ['#noalgorithm'], hearts: 22, ago: 5 },
            { u: 0, content: "Chronic scrollers are not lazy. They're people whose attention was stolen by something specifically engineered to steal it.", tags: [], hearts: 31, ago: 8 },
            { u: 0, content: "Yawp theory: the best conversations happen when nobody's tracking how many people are watching.", tags: [], hearts: 17, ago: 12 },
            { u: 0, content: "Wrote something just for me today. Didn't publish it. Felt radical.", tags: ['#writing'], hearts: 9, ago: 18 },
            // Jordan Chen
            { u: 1, content: "Hot take: a social network that shows posts in the order they were written is a radical act.", tags: ['#chronological'], hearts: 27, ago: 1 },
            { u: 1, content: "I've been writing morning pages for 30 days. The voice in my head got quieter. The one on the page got louder.", tags: ['#writing', '#morningpages'], hearts: 19, ago: 4 },
            { u: 1, content: "Miss when the internet felt like discovery instead of delivery.", tags: ['#smallweb'], hearts: 33, ago: 6 },
            { u: 1, content: "Follower counts are just leaderboards for a game nobody agreed to play.", tags: [], hearts: 41, ago: 9 },
            { u: 1, content: "There's a specific kind of loneliness that comes from being seen by millions and known by none.", tags: [], hearts: 52, ago: 14 },
            { u: 1, content: "Some days I want to say something. Some days I want to listen. Today: just here.", tags: [], hearts: 7, ago: 20 },
            // Taylor Morgan
            { u: 2, content: "Logged off Instagram 6 months ago. Nobody noticed except me — and I noticed I felt better.", tags: ['#digitaldetox'], hearts: 38, ago: 2 },
            { u: 2, content: "The best thing about Yawp is that I genuinely don't know if anyone will read this. Somehow that makes me write more honestly.", tags: [], hearts: 24, ago: 5 },
            { u: 2, content: "Less reach, more resonance.", tags: [], hearts: 18, ago: 7 },
            { u: 2, content: "Slow internet is a philosophy, not a limitation.", tags: ['#slowinternet'], hearts: 29, ago: 10 },
            { u: 2, content: "Turns out what I wanted wasn't an audience. I wanted a conversation.", tags: [], hearts: 45, ago: 15 },
            { u: 2, content: "Tried to explain Yawp to a friend. They asked 'but how do you grow?' I said 'that's kind of the point.'", tags: [], hearts: 36, ago: 22 },
        ];

        // ── Seed replies ──────────────────────────────────────────────────────
        // Keyed by SEED_POSTS index; replied by user index
        const SEED_REPLIES = [
            { postIdx: 0,  u: 1, content: "Same experience. The silence when you first quit is uncomfortable — then it becomes the point.", ago: 2 },
            { postIdx: 0,  u: 2, content: "Six months off and I still feel the phantom reach for the app.", ago: 2 },
            { postIdx: 6,  u: 0, content: "Genuinely the most subversive thing a platform can do right now. Hats off.", ago: 1 },
            { postIdx: 6,  u: 2, content: "Chronological is just… respecting the reader's time.", ago: 1 },
            { postIdx: 8,  u: 0, content: "Discovery vs delivery is a perfect framing. Going to be thinking about this one.", ago: 5 },
            { postIdx: 9,  u: 2, content: "This needs to be on a poster somewhere.", ago: 8 },
            { postIdx: 10, u: 0, content: "Written at 2am and it still hits. Thank you.", ago: 13 },
            { postIdx: 12, u: 1, content: "The first week is the hardest. After that you stop missing it and start missing the person you were before it.", ago: 2 },
            { postIdx: 16, u: 0, content: "This is why I'm here. A conversation, not a broadcast.", ago: 14 },
            { postIdx: 16, u: 1, content: "And here we are, having one.", ago: 14 },
        ];

        // ── Seed circles ──────────────────────────────────────────────────────
        const SEED_CIRCLES = [
            {
                name: 'Slow Readers', description: 'For people who read deliberately and without rushing.',
                color: '#47FFB2', createdBy: 0,
                messages: [
                    { u: 0, content: "Currently 60 pages into Ursula K. Le Guin's The Dispossessed. Reading one chapter a day. Highly recommend this pace." },
                    { u: 1, content: "I did that with Middlemarch last year. One chapter over coffee each morning. Finished it feeling genuinely changed." },
                    { u: 2, content: "Any recommendations for books that reward slow reading? I find most contemporary stuff is written to be consumed, not savored." },
                    { u: 0, content: "Anything by Marilynne Robinson. Gilead especially. Every sentence is doing three things at once." },
                    { u: 1, content: "Just finished Gilead actually. Sat with the last page for about 20 minutes before closing it." },
                ]
            },
            {
                name: 'Algorithm-Free Zone', description: 'Discussing digital minimalism, attention, and the internet we actually want.',
                color: '#E8FF47', createdBy: 1,
                messages: [
                    { u: 1, content: "Question for the group: what did you do with the time you reclaimed when you quit the algorithmic feeds?" },
                    { u: 2, content: "Honestly? Stared at the wall a lot at first. Then started cooking properly. Then started writing again." },
                    { u: 0, content: "I read more. Not just books — longer articles, things that took concentration. Forgot I used to like that." },
                    { u: 1, content: "I think that's the real cost nobody talks about — it's not just time stolen, it's the *capacity* for depth that atrophies." },
                    { u: 2, content: "Reclaiming that capacity is slow. But it's the most worthwhile thing I've done online in years." },
                    { u: 0, content: "And here we are on Yawp. Being weird and slow on purpose." },
                ]
            },
            {
                name: 'Morning Pages', description: 'A circle for daily writing practice. Share what you wrote about (not what you wrote).',
                color: '#7C4DFF', createdBy: 1,
                messages: [
                    { u: 1, content: "Day 31. Still going. Today: a memory from age 9 that I haven't thought about in years. Pages keep surfacing things." },
                    { u: 0, content: "I started two weeks ago because of your posts about this. It's stranger than I expected. More honest." },
                    { u: 2, content: "What time do you all write? I've been doing it at 6am but wondering if evening works too." },
                    { u: 1, content: "Morning is the whole point for me — before the day has a chance to shape my thoughts. But evening reflection has a different quality." },
                    { u: 0, content: "Morning. Always morning. Before my phone. Before coffee even. The first-draft brain." },
                ]
            },
        ];

        // ── Helpers ───────────────────────────────────────────────────────────
        function daysAgo(n) {
            return Date.now() - n * 24 * 60 * 60 * 1000 - Math.floor(Math.random() * 3600000);
        }

        const list = document.getElementById('user-list');
        DEMO_USERS.forEach((u, i) => {
            list.innerHTML += `
                <div class="user-row" id="row-${i}">
                    <div class="avatar">${u.avatar}</div>
                    <div class="user-info">
                        <div class="name">${u.name}</div>
                        <div class="email">${u.email}</div>
                    </div>
                    <span class="badge pending" id="auth-badge-${i}">Auth: –</span>
                    <span class="badge pending" id="db-badge-${i}">DB: –</span>
                </div>`;
        });

        function log(msg, type = '') {
            const el = document.getElementById('log');
            const cls = type ? ` class="${type}"` : '';
            el.innerHTML += `<span${cls}>${msg}</span>\n`;
            el.scrollTop = el.scrollHeight;
        }
        function setBadge(id, text, state) {
            const el = document.getElementById(id);
            el.textContent = text; el.className = `badge ${state}`;
        }
        function setButtons(disabled) {
            document.getElementById('btn-check').disabled = disabled;
            document.getElementById('btn-seed').disabled = disabled;
        }

        // ── Create or sign-in a demo user, returns { uid, index } ─────────────
        async function ensureUser(user, i) {
            let uid;
            try {
                const cred = await auth.createUserWithEmailAndPassword(user.email, user.password);
                uid = cred.user.uid;
                log(`  [${user.name}] Auth account created`, 'ok');
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    const cred = await auth.signInWithEmailAndPassword(user.email, user.password);
                    uid = cred.user.uid;
                    log(`  [${user.name}] Auth: already exists, signed in`, 'info');
                } else {
                    log(`  [${user.name}] Auth error: ${err.message}`, 'err');
                    setBadge(`auth-badge-${i}`, 'Auth: fail', 'error');
                    return null;
                }
            }
            setBadge(`auth-badge-${i}`, 'Auth: OK', 'ok');

            // Write profile document (profiles/{uid})
            await db.collection('profiles').doc(uid).set({
                uid,
                username: user.username,
                displayName: user.displayName,
                email: user.email,
                bio: user.bio,
                avatarUrl: null,
                isPlus: false,
                createdAt: daysAgo(30),
                isDemo: true,
            });
            setBadge(`db-badge-${i}`, 'DB: OK', 'ok');
            log(`  [${user.name}] Profile written`, 'ok');
            await auth.signOut();
            return uid;
        }

        // ── Seed all posts + replies ──────────────────────────────────────────
        async function seedContent(uids) {
            log('\nSeeding posts...', 'info');
            const postIds = [];
            for (const p of SEED_POSTS) {
                const ref = await db.collection('posts').add({
                    userId: uids[p.u],
                    content: p.content,
                    tags: p.tags,
                    heartCount: p.hearts,
                    echoCount: 0,
                    replyCount: 0,
                    createdAt: daysAgo(p.ago),
                });
                postIds.push(ref.id);
                log(`  Post by ${DEMO_USERS[p.u].name.split(' ')[0]}: "${p.content.slice(0, 50)}..."`, 'ok');
            }

            log('\nSeeding replies...', 'info');
            for (const r of SEED_REPLIES) {
                const postRef = db.collection('posts').doc(postIds[r.postIdx]);
                await postRef.collection('replies').add({
                    postId: postIds[r.postIdx],
                    userId: uids[r.u],
                    content: r.content,
                    heartCount: Math.floor(Math.random() * 8),
                    createdAt: daysAgo(r.ago),
                });
                // Increment replyCount
                await postRef.update({ replyCount: firebase.firestore.FieldValue.increment(1) });
                log(`  Reply by ${DEMO_USERS[r.u].name.split(' ')[0]}`, 'ok');
            }
        }

        // ── Seed circles + messages ───────────────────────────────────────────
        async function seedCircles(uids) {
            log('\nSeeding circles...', 'info');
            for (const c of SEED_CIRCLES) {
                const circleRef = await db.collection('circles').add({
                    name: c.name,
                    description: c.description,
                    color: c.color,
                    createdBy: uids[c.createdBy],
                    memberCount: 3,
                    createdAt: daysAgo(25),
                });
                log(`  Circle: "${c.name}"`, 'ok');
                let msgTime = daysAgo(20);
                for (const m of c.messages) {
                    msgTime += Math.floor(Math.random() * 7200000) + 900000; // 15min–2hr gaps
                    await circleRef.collection('messages').add({
                        userId: uids[m.u],
                        content: m.content,
                        createdAt: msgTime,
                    });
                }
                log(`    └ ${c.messages.length} messages seeded`, 'ok');
            }
        }

        // ── Seed a DM conversation between demo1 and demo2 ───────────────────
        async function seedMessages(uids) {
            log('\nSeeding direct messages...', 'info');
            const [uid0, uid1] = [uids[0], uids[1]];
            const convRef = await db.collection('conversations').add({
                participants: [uid0, uid1],
                lastMessage: 'And here we are.',
                lastMessageAt: daysAgo(1),
            });
            const dms = [
                { sender: uid0, text: "Hey — did you see Jordan's post about the algorithm? Really well put.", ago: 3 },
                { sender: uid1, text: "Yes! The follower counts as leaderboards line is going to live in my head for a while.", ago: 3 },
                { sender: uid0, text: "Right? I found this place through a blog post that described it as 'the anti-Twitter.' Took me a week to understand why that was a compliment.", ago: 2 },
                { sender: uid1, text: "Ha. Same. I kept looking for the engagement metrics and then slowly realized that was the whole point.", ago: 2 },
                { sender: uid0, text: "And here we are.", ago: 1 },
            ];
            for (const dm of dms) {
                await convRef.collection('messages').add({
                    conversationId: convRef.id,
                    senderId: dm.sender,
                    content: dm.text,
                    readAt: null,
                    createdAt: daysAgo(dm.ago),
                });
            }
            log('  Conversation between Alex & Jordan seeded', 'ok');
        }

        // ── Full seed flow ────────────────────────────────────────────────────
        async function runFullSeed() {
            setButtons(true);
            document.getElementById('log').innerHTML = '';
            log('Starting full seed...\n', 'info');

            const uids = [];
            for (let i = 0; i < DEMO_USERS.length; i++) {
                setBadge(`auth-badge-${i}`, 'Auth: …', 'pending');
                setBadge(`db-badge-${i}`, 'DB: …', 'pending');
                const uid = await ensureUser(DEMO_USERS[i], i);
                if (!uid) { setButtons(false); return; }
                uids.push(uid);
            }

            await seedContent(uids);
            await seedCircles(uids);
            await seedMessages(uids);

            log('\n✓ Full seed complete. Run "Check Access" to verify.', 'ok');
            setButtons(false);
        }

        // ── Access check flow ─────────────────────────────────────────────────
        async function runCheck() {
            setButtons(true);
            document.getElementById('log').innerHTML = '';
            log('Running access check...', 'info');
            for (let i = 0; i < DEMO_USERS.length; i++) {
                const user = DEMO_USERS[i];
                setBadge(`auth-badge-${i}`, 'Auth: …', 'pending');
                setBadge(`db-badge-${i}`, 'DB: …', 'pending');
                try {
                    const cred = await auth.signInWithEmailAndPassword(user.email, user.password);
                    setBadge(`auth-badge-${i}`, 'Auth: OK', 'ok');
                    log(`  [${user.name}] Auth OK (uid: ${cred.user.uid})`, 'ok');
                    const snap = await db.collection('profiles').doc(cred.user.uid).get();
                    if (snap.exists) {
                        setBadge(`db-badge-${i}`, 'DB: OK', 'ok');
                        log(`  [${user.name}] Profile found (@${snap.data().username})`, 'ok');
                    } else {
                        setBadge(`db-badge-${i}`, 'DB: missing', 'warn');
                        log(`  [${user.name}] Profile doc missing — run Full Seed`, 'err');
                    }
                    await auth.signOut();
                } catch (err) {
                    setBadge(`auth-badge-${i}`, 'Auth: fail', 'error');
                    setBadge(`db-badge-${i}`, 'DB: –', 'pending');
                    log(`  [${user.name}] Auth failed: ${err.message}`, 'err');
                }
            }
            log('\nCheck complete.', 'info');
            setButtons(false);
        }
    </script>
</body>
</html>
